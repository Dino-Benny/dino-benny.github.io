<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% if page.head_title %}<title>{{ page.head_title }}</title>{% else %}<title>{{ page.title }} | {{ site.title }}</title>{% endif %}
<meta name="description" content="{{ page.description | default: site.description | strip_newlines | escape }}">
{% if page.noindex %}<meta name="robots" content="noindex">{% endif %}
<link rel="canonical" href="{{ site.url }}{{ page.url }}">
<meta property="og:type" content="{{ page.og_type | default: 'website' }}">
{% if page.layout == 'book' %}<meta property="og:title" content="{{ page.title }} · Dino and Benny, Book {{ page.number }}">
<meta property="og:image" content="{{ site.url }}/images/{{ page.cover }}">{% else %}<meta property="og:title" content="{{ page.og_title | default: site.title }}">
<meta property="og:image" content="{{ site.url }}/images/og-home.jpg">{% endif %}
<meta property="og:description" content="{{ page.og_description | default: page.description | default: site.description | strip_newlines | escape }}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
<link rel="icon" type="image/png" sizes="64x64" href="/images/favicon-64.png">
<link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
{% if page.layout == 'book' %}<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Book",
  "name": {{ page.title | jsonify }},
  "position": {{ page.number }},
  "author": {"@type": "Person", "name": "S. & H. Rajan"},
  "publisher": {"@type": "Organization", "name": "Dino and Benny, LLC"},
  "isPartOf": {"@type": "BookSeries", "name": {{ site.title | jsonify }}},
  "image": "{{ site.url }}/images/{{ page.cover }}",
  "url": "{{ site.url }}{{ page.url }}",
  "offers": {"@type": "Offer", "url": "{{ page.buy_url | default: site.amazon_series_url }}"}
}
</script>{% endif %}{% if page.url == '/' %}<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BookSeries",
  "name": {{ site.title | jsonify }},
  "url": "{{ site.url }}/",
  "author": {"@type": "Person", "name": "S. & H. Rajan"},
  "publisher": {"@type": "Organization", "name": "Dino and Benny, LLC"},
  "description": "Gentle, villain-free picture books for early readers, following best friends Dino and Benny on adventures around the world."
}
</script>{% endif %}
